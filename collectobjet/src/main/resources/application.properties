# ========================
# PostgreSQL
# (mot de passe : SPRING_DATASOURCE_PASSWORD ou POSTGRES_PASSWORD — voir .env / env.example)
# ========================
server.port=8081
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/collectobjet}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ========================
# JWT (utiliser JWT_SECRET en production)
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ========================
# Cloudinary — définir CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
# ========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ========================
# CORS (origines ou motifs, séparés par des virgules — ex. https://*.vercel.app pour les previews)
# ========================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ========================
# Upload multipart
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ========================
# SMS
# ========================
sms.enabled=false
sms.provider=africastalking

# Africa's Talking (optionnel)
africastalking.username=${AFRICASTALKING_USERNAME:sandbox}
africastalking.api-key=${AFRICASTALKING_API_KEY:}
